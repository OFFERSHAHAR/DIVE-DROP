  <rect x="665" y="175" width="470" height="110" rx="28" class="card blue"/>
  <text x="900" y="225" text-anchor="middle" class="text">פנייה חופשית</text>
  <text x="900" y="258" text-anchor="middle" class="small">"אני לא יודע למי לפנות"</text>

  <path class="arrow" d="M900 285 V350"/>
