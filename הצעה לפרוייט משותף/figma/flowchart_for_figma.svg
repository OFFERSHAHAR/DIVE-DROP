  <rect x="1095" y="960" width="300" height="120" rx="24" class="card"/>
  <text x="1245" y="1010" text-anchor="middle" class="text">ליווי</text><text x="1245" y="1043" text-anchor="middle" class="small">עובד סוציאלי/קהילה</text>
  <rect x="1420" y="960" width="300" height="120" rx="24" class="card"/>
