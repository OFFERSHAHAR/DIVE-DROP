  <path class="arrow" d="M900 935 C900 920 270 920 270 960"/>
  <path class="arrow" d="M900 935 C900 920 595 920 595 960"/>
  <path class="arrow" d="M900 935 V960"/>
  <path class="arrow" d="M900 935 C900 920 1245 920 1245 960"/>
  <path class="arrow" d="M900 935 C900 920 1570 920 1570 960"/>

  <text x="900" y="1160" text-anchor="middle" class="small">הבטחת חוויה: אין טופס קר, אין שיפוט, אין הבטחות שווא - יש צעד ראשון ברור, בטוח ומכבד.</text>
