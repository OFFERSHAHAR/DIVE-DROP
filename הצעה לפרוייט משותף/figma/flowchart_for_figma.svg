  <rect x="120" y="960" width="300" height="120" rx="24" class="card"/>
  <text x="270" y="1010" text-anchor="middle" class="text">זכויות</text><text x="270" y="1043" text-anchor="middle" class="small">הסבר ומפת מסלול</text>
  <rect x="445" y="960" width="300" height="120" rx="24" class="card"/>
