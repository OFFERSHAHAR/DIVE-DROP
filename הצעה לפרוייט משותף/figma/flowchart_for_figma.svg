  <text x="1555" y="606" text-anchor="middle" class="small">מעבר אנושי / חירום</text>

  <path class="arrow" d="M245 655 V745 H620"/>
  <path class="arrow" d="M1555 655 V745 H1180"/>

  <rect x="620" y="715" width="560" height="150" rx="30" class="card"/>
  <text x="900" y="770" text-anchor="middle" class="text">Orchestrator ב-n8n</text>
