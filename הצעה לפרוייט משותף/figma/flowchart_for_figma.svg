<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1250" viewBox="0 0 1800 1250">
  <defs>
    <style>
      .bg{fill:#f5f0e8}.card{fill:#fffaf2;stroke:#e4d8c8;stroke-width:3}.green{fill:#dfeee4}.yellow{fill:#fff0c4}.red{fill:#ffe4e1}.blue{fill:#dce8ff}.text{font-family:Arial,sans-serif;fill:#17251f;font-size:30px;font-weight:700}.small{font-size:22px;font-weight:500;fill:#43554b}.title{font-size:54px;font-weight:900}.arrow{stroke:#397a63;stroke-width:5;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#397a63"/></marker>
  </defs>
  <rect class="bg" width="1800" height="1250"/>
  <text x="900" y="85" text-anchor="middle" class="text title">עוגן AI - מערכת תמיכה וניווט למשוחררים</text>
