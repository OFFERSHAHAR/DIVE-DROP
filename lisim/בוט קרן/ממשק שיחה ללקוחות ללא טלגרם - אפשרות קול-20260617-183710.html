<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>שיחה עם סטודיו תכשיטים</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #192022;
      --muted: #5c686b;
      --line: #d8dee0;
      --paper: #f8f7f2;
      --panel: #ffffff;
      --accent: #0d766e;
      --accent-strong: #095e58;
      --warm: #c6904b;
      --danger: #a43d3d;
      font-family: Arial, "Noto Sans Hebrew", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(13, 118, 110, 0.12), transparent 38%),
        linear-gradient(315deg, rgba(198, 144, 75, 0.15), transparent 42%),
        var(--paper);
      color: var(--ink);
    }

    .shell {
      width: min(980px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      padding: 18px;
      gap: 12px;
    }

    header,
    .composer,
    .setup {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(25, 32, 34, 0.08);
    }

    header {
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warm);
    }

    .dot.ready {
      background: var(--accent);
    }

    .dot.error {
      background: var(--danger);
    }

    .setup {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--panel);
      color: var(--ink);
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(13, 118, 110, 0.14);
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover {
      background: var(--accent-strong);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .icon-button {
      width: 48px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      background: #eef4f3;
      color: var(--ink);
      border: 1px solid #c7dedb;
    }

    .icon-button:hover,
    .icon-button.active {
      background: var(--accent);
      color: #fff;
    }

    .icon-button svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chat {
      min-height: 420px;
      overflow: auto;
      padding: 4px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: min(720px, 88%);
      padding: 12px 14px;
      border-radius: 8px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .bubble.user {
      align-self: flex-start;
      background: #e8f3f1;
      border-color: #c7dedb;
    }

    .bubble.bot {
      align-self: flex-end;
    }

    .bubble.error {
      border-color: rgba(164, 61, 61, 0.35);
      color: var(--danger);
    }

    .composer {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 10px;
      align-items: end;
    }

    textarea {
      min-height: 58px;
      max-height: 150px;
      resize: vertical;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 720px) {
      .shell {
        padding: 10px;
      }

      header,
      .setup,
      .composer {
        grid-template-columns: 1fr;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      button,
      .icon-button {
        width: 100%;
      }

      .bubble {
        max-width: 94%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <h1>שיחה עם סטודיו תכשיטים</h1>
      <div class="status" aria-live="polite">
        <span id="dot" class="dot"></span>
        <span id="statusText">ממתין לחיבור</span>
      </div>
    </header>

    <section class="setup" aria-label="הגדרת חיבור">
      <label>
        כתובת חיבור
        <input id="webhookUrl" type="url" placeholder="הדבק כאן את כתובת החיבור מהתהליך">
      </label>
      <button id="saveUrl" type="button">שמירה</button>
    </section>

    <section id="chat" class="chat" aria-live="polite"></section>

    <form id="form" class="composer">
      <label>
        הודעה
        <textarea id="message" placeholder="כתוב או דבר כאן"></textarea>
      </label>
      <button id="listen" class="icon-button" type="button" title="דיבור" aria-label="דיבור">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <path d="M12 19v3"></path>
        </svg>
      </button>
      <button id="voiceToggle" class="icon-button" type="button" title="הקראה" aria-label="הקראה">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M11 5 6 9H3v6h3l5 4V5Z"></path>
          <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
          <path d="M18.5 5.5a9 9 0 0 1 0 13"></path>
        </svg>
      </button>
      <button id="send" type="submit">שליחה</button>
    </form>
  </main>

  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const message = document.getElementById('message');
    const webhookUrl = document.getElementById('webhookUrl');
    const saveUrl = document.getElementById('saveUrl');
    const send = document.getElementById('send');
    const listen = document.getElementById('listen');
    const voiceToggle = document.getElementById('voiceToggle');
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('statusText');

    const sessionIdKey = 'jewelry_chat_session_id';
    const webhookKey = 'jewelry_chat_webhook_url';
    const voiceKey = 'jewelry_chat_voice_enabled';
    let sessionId = localStorage.getItem(sessionIdKey);
    let voiceEnabled = localStorage.getItem(voiceKey) === 'true';
    let recognition = null;
    let listening = false;

    if (!sessionId) {
      sessionId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
      localStorage.setItem(sessionIdKey, sessionId);
    }

    webhookUrl.value = localStorage.getItem(webhookKey) || '';
    voiceToggle.classList.toggle('active', voiceEnabled);
    setReady(Boolean(webhookUrl.value));
    addBubble('bot', 'שלום, איך אפשר לעזור?');
    setupSpeechRecognition();

    saveUrl.addEventListener('click', () => {
      localStorage.setItem(webhookKey, webhookUrl.value.trim());
      setReady(Boolean(webhookUrl.value.trim()));
    });

    webhookUrl.addEventListener('change', () => {
      localStorage.setItem(webhookKey, webhookUrl.value.trim());
      setReady(Boolean(webhookUrl.value.trim()));
    });

    voiceToggle.addEventListener('click', () => {
      voiceEnabled = !voiceEnabled;
      localStorage.setItem(voiceKey, String(voiceEnabled));
      voiceToggle.classList.toggle('active', voiceEnabled);
      if (!voiceEnabled && 'speechSynthesis' in window) {
        speechSynthesis.cancel();
      }
    });

    listen.addEventListener('click', () => {
      if (!recognition) {
        addBubble('error', 'הדפדפן הזה לא תומך בזיהוי דיבור. נסה לפתוח בכרום.');
        setError();
        return;
      }

      if (listening) {
        recognition.stop();
      } else {
        recognition.start();
      }
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const text = message.value.trim();
      const url = webhookUrl.value.trim();

      if (!url) {
        addBubble('error', 'חסרה כתובת חיבור.');
        setError();
        return;
      }

      if (!text) {
        return;
      }

      message.value = '';
      addBubble('user', text);
      send.disabled = true;
      listen.disabled = true;
      statusText.textContent = 'שולח הודעה';

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            message: text,
            sessionId,
            source: 'web-voice',
          }),
        });

        const contentType = response.headers.get('content-type') || '';
        const data = contentType.includes('application/json')
          ? await response.json()
          : { reply: await response.text() };

        if (!response.ok) {
          throw new Error(data.message || data.reply || 'השרת החזיר שגיאה.');
        }

        const reply = data.reply || data.output || data.text || 'לא התקבלה תשובה.';
        addBubble('bot', reply);
        speak(reply);
        statusText.textContent = 'מחובר';
        dot.classList.remove('error');
      } catch (error) {
        addBubble('error', 'לא הצלחתי לשלוח. בדוק שהכתובת נכונה ושהתהליך פעיל.');
        setError();
      } finally {
        send.disabled = false;
        listen.disabled = false;
        message.focus();
      }
    });

    message.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });

    function setupSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        listen.disabled = true;
        return;
      }

      recognition = new SpeechRecognition();
      recognition.lang = 'he-IL';
      recognition.interimResults = true;
      recognition.continuous = false;

      recognition.onstart = () => {
        listening = true;
        listen.classList.add('active');
        statusText.textContent = 'מאזין';
      };

      recognition.onresult = (event) => {
        let finalText = '';
        let interimText = '';

        for (let index = event.resultIndex; index < event.results.length; index += 1) {
          const transcript = event.results[index][0].transcript;
          if (event.results[index].isFinal) {
            finalText += transcript;
          } else {
            interimText += transcript;
          }
        }

        message.value = (finalText || interimText).trim();

        if (finalText.trim()) {
          form.requestSubmit();
        }
      };

      recognition.onerror = () => {
        setError();
        addBubble('error', 'לא הצלחתי לשמוע ברור. אפשר לנסות שוב.');
      };

      recognition.onend = () => {
        listening = false;
        listen.classList.remove('active');
        if (!dot.classList.contains('error')) {
          statusText.textContent = webhookUrl.value.trim() ? 'מחובר' : 'ממתין לחיבור';
        }
      };
    }

    function speak(text) {
      if (!voiceEnabled || !('speechSynthesis' in window)) {
        return;
      }

      speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'he-IL';
      utterance.rate = 0.95;
      utterance.pitch = 1;
      utterance.onstart = () => {
        statusText.textContent = 'מקריא תשובה';
      };
      utterance.onend = () => {
        statusText.textContent = webhookUrl.value.trim() ? 'מחובר' : 'ממתין לחיבור';
      };
      speechSynthesis.speak(utterance);
    }

    function addBubble(type, text) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + type;
      bubble.textContent = text;
      chat.appendChild(bubble);
      chat.scrollTop = chat.scrollHeight;
    }

    function setReady(ready) {
      dot.classList.remove('error');
      dot.classList.toggle('ready', ready);
      statusText.textContent = ready ? 'מחובר' : 'ממתין לחיבור';
    }

    function setError() {
      dot.classList.remove('ready');
      dot.classList.add('error');
      statusText.textContent = 'שגיאת חיבור';
    }
  </script>
</body>
</html>
