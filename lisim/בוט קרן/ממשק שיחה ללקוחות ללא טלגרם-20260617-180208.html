<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>שיחה עם סטודיו תכשיטים</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #192022;
      --muted: #5c686b;
      --line: #d8dee0;
      --paper: #f8f7f2;
      --panel: #ffffff;
      --accent: #0d766e;
      --accent-strong: #095e58;
      --warm: #c6904b;
      --danger: #a43d3d;
      font-family: Arial, "Noto Sans Hebrew", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(13, 118, 110, 0.12), transparent 38%),
        linear-gradient(315deg, rgba(198, 144, 75, 0.15), transparent 42%),
        var(--paper);
      color: var(--ink);
    }

    .shell {
      width: min(980px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 18px;
      gap: 12px;
    }

    header,
    .composer,
    .setup {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(25, 32, 34, 0.08);
    }

    header {
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warm);
    }

    .dot.ready {
      background: var(--accent);
    }

    .setup {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--panel);
      color: var(--ink);
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(13, 118, 110, 0.14);
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover {
      background: var(--accent-strong);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .chat {
      min-height: 420px;
      overflow: auto;
      padding: 4px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: min(720px, 88%);
      padding: 12px 14px;
      border-radius: 8px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .bubble.user {
      align-self: flex-start;
      background: #e8f3f1;
      border-color: #c7dedb;
    }

    .bubble.bot {
      align-self: flex-end;
    }

    .bubble.error {
      border-color: rgba(164, 61, 61, 0.35);
      color: var(--danger);
    }

    .composer {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    textarea {
      min-height: 58px;
      max-height: 150px;
      resize: vertical;
    }

    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      .shell {
        padding: 10px;
      }

      header,
      .setup,
      .composer {
        grid-template-columns: 1fr;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .bubble {
        max-width: 94%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <h1>שיחה עם סטודיו תכשיטים</h1>
      <div class="status" aria-live="polite">
        <span id="dot" class="dot"></span>
        <span id="statusText">ממתין לחיבור</span>
      </div>
    </header>

    <section class="setup" aria-label="הגדרת חיבור">
      <label>
        כתובת וובהוק
        <input id="webhookUrl" type="url" placeholder="הדבק כאן את כתובת הוובהוק מהתהליך">
      </label>
      <button id="saveUrl" type="button">שמירה</button>
    </section>

    <section id="chat" class="chat" aria-live="polite"></section>

    <form id="form" class="composer">
      <label>
        הודעה
        <textarea id="message" placeholder="כתוב כאן שאלה על הזמנה, מחיר, עיצוב אישי או תכשיט מחלב אם"></textarea>
        <span class="hint">הדף שולח רק את ההודעה והמספר הזמני של השיחה.</span>
      </label>
      <button id="send" type="submit">שליחה</button>
    </form>
  </main>

  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const message = document.getElementById('message');
    const webhookUrl = document.getElementById('webhookUrl');
    const saveUrl = document.getElementById('saveUrl');
    const send = document.getElementById('send');
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('statusText');

    const sessionIdKey = 'jewelry_chat_session_id';
    const webhookKey = 'jewelry_chat_webhook_url';
    let sessionId = localStorage.getItem(sessionIdKey);

    if (!sessionId) {
      sessionId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
      localStorage.setItem(sessionIdKey, sessionId);
    }

    webhookUrl.value = localStorage.getItem(webhookKey) || '';
    setReady(Boolean(webhookUrl.value));
    addBubble('bot', 'שלום, איך אפשר לעזור?');

    saveUrl.addEventListener('click', () => {
      localStorage.setItem(webhookKey, webhookUrl.value.trim());
      setReady(Boolean(webhookUrl.value.trim()));
    });

    webhookUrl.addEventListener('change', () => {
      localStorage.setItem(webhookKey, webhookUrl.value.trim());
      setReady(Boolean(webhookUrl.value.trim()));
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const text = message.value.trim();
      const url = webhookUrl.value.trim();

      if (!url) {
        addBubble('error', 'חסרה כתובת וובהוק.');
        return;
      }

      if (!text) {
        return;
      }

      message.value = '';
      addBubble('user', text);
      send.disabled = true;
      statusText.textContent = 'שולח הודעה';

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            message: text,
            sessionId,
            source: 'web',
          }),
        });

        const contentType = response.headers.get('content-type') || '';
        const data = contentType.includes('application/json')
          ? await response.json()
          : { reply: await response.text() };

        if (!response.ok) {
          throw new Error(data.message || data.reply || 'השרת החזיר שגיאה.');
        }

        addBubble('bot', data.reply || data.output || data.text || 'לא התקבלה תשובה.');
        statusText.textContent = 'מחובר';
      } catch (error) {
        addBubble('error', 'לא הצלחתי לשלוח. בדוק שהכתובת נכונה ושהתהליך פעיל.');
        statusText.textContent = 'שגיאת חיבור';
      } finally {
        send.disabled = false;
        message.focus();
      }
    });

    message.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });

    function addBubble(type, text) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + type;
      bubble.textContent = text;
      chat.appendChild(bubble);
      chat.scrollTop = chat.scrollHeight;
    }

    function setReady(ready) {
      dot.classList.toggle('ready', ready);
      statusText.textContent = ready ? 'מחובר' : 'ממתין לחיבור';
    }
  </script>
</body>
</html>
