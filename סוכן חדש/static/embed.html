<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AGENT HUB GURU — צ'אט</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,Arial,sans-serif;background:#fff;height:100vh;display:flex;flex-direction:column}
  #header{background:#1a1a2e;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px}
  #header .logo{font-weight:700;font-size:15px;color:#a78bfa}
  #header .agent-name{font-size:13px;color:#c4b5fd}
  #header .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  #messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
  .msg{max-width:80%;padding:10px 14px;border-radius:12px;line-height:1.5;font-size:14px}
  .msg.bot{background:#f3f0ff;color:#1a1a2e;align-self:flex-start;border-radius:12px 12px 12px 0}
  .msg.user{background:#1a1a2e;color:#fff;align-self:flex-end;border-radius:12px 12px 0 12px}
  .typing{display:flex;gap:4px;align-items:center;padding:10px 14px;background:#f3f0ff;border-radius:12px;width:56px}
  .typing span{width:7px;height:7px;border-radius:50%;background:#a78bfa;animation:bounce .8s infinite}
  .typing span:nth-child(2){animation-delay:.15s}
  .typing span:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  #footer{padding:10px 12px;border-top:1px solid #e5e7eb;background:#fafafa;display:flex;gap:8px}
  #msg-input{flex:1;border:1px solid #d1d5db;border-radius:8px;padding:9px 12px;font-size:14px;resize:none;font-family:inherit;direction:rtl}
  #msg-input:focus{outline:none;border-color:#7c3aed}
  #send-btn{background:#7c3aed;color:#fff;border:none;border-radius:8px;padding:9px 18px;cursor:pointer;font-size:14px;font-weight:600;white-space:nowrap}
  #send-btn:hover{background:#6d28d9}
  #send-btn:disabled{opacity:.5;cursor:not-allowed}
  .powered{text-align:center;font-size:10px;color:#9ca3af;padding:4px}
</style>
</head>
<body>
<div id="header">
  <div class="dot"></div>
  <div>
    <div class="logo">AGENT HUB GURU</div>
    <div class="agent-name" id="agent-label">אלון — מחובר</div>
  </div>
</div>
<div id="messages"></div>
<div id="footer">
  <button id="send-btn" onclick="sendMsg()">שלח</button>
  <textarea id="msg-input" rows="1" placeholder="כתוב הודעה..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
</div>
<div class="powered">Powered by AGENT HUB GURU</div>

<script>
const params  = new URLSearchParams(location.search);
const agentParam = params.get('agent') || 'auto';  // cs | sales | leads | auto
const BASE    = params.get('base') || '';
const labels  = {cs:'שירות לקוחות',sales:'מכירות',leads:'מסווג לידים',auto:'אלון'};
document.getElementById('agent-label').textContent = (labels[agentParam]||'אלון') + ' — מחובר';

let sessionId = null;
let currentAgent = agentParam === 'auto' ? 'cs' : agentParam;

const msgsEl  = document.getElementById('messages');
const inputEl = document.getElementById('msg-input');
const btnEl   = document.getElementById('send-btn');

function addMsg(text, role){
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = text;
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return d;
}
function showTyping(){
  const d = document.createElement('div');
  d.className = 'typing';
  d.innerHTML = '<span></span><span></span><span></span>';
  d.id = 'typing';
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
function hideTyping(){
  const t = document.getElementById('typing');
  if(t) t.remove();
}

// בחירת endpoint
function endpoint(path){ return BASE + path; }

async function initSession(){
  const res = await fetch(endpoint('/api/cs/session'),{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
  const d = await res.json();
  sessionId = d.session_id;
  if(d.message) addMsg(d.message,'bot');
}

async function sendMsg(){
  const text = inputEl.value.trim();
  if(!text || !sessionId) return;
  inputEl.value = '';
  addMsg(text,'user');
  btnEl.disabled = true;
  showTyping();

  // auto-route: זיהוי מקומי אם צריך לעבור לסוכן מכירות
  let apiPath = '/api/cs/chat';
  if(agentParam === 'sales') apiPath = '/api/sales/chat';

  try{
    const res = await fetch(endpoint(apiPath),{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({session_id:sessionId, message:text})
    });
    const d = await res.json();
    hideTyping();
    addMsg(d.message || d.error || 'שגיאה','bot');
  } catch(e){
    hideTyping();
    addMsg('לא הצלחתי להגיע לשרת. בדוק שהשרת פועל.','bot');
  }
  btnEl.disabled = false;
  inputEl.focus();
}

initSession();
</script>
</body>
</html>
