<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Python Interactive IDE - Day by Day</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1e40af 0%, #0f172a 100%);
            color: #e2e8f0;
            line-height: 1.8;
            height: 100vh;
            overflow: hidden;
        }

        .navbar {
            background: linear-gradient(90deg, #1e40af 0%, #1e3a8a 100%);
            padding: 15px 30px;
            border-bottom: 4px solid #3b82f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
            flex-wrap: wrap;
            gap: 15px;
        }

        .navbar-title {
            font-size: 1.6em;
            color: #60a5fa;
            font-weight: bold;
        }

        .navbar-info {
            color: #bfdbfe;
            font-size: 0.9em;
        }

        .day-indicator {
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 100px);
            overflow: hidden;
        }

        .panel {
            background: #0f172a;
            border: 2px solid #3b82f6;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.2);
        }

        .panel-header {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            padding: 15px 20px;
            border-bottom: 2px solid #3b82f6;
            color: white;
            font-weight: bold;
            font-size: 1.1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-content {
            flex: 1;
            overflow: auto;
            padding: 20px;
            color: #bfdbfe;
        }

        /* Editor */
        .editor-area {
            display: flex;
            flex-direction: column;
        }

        #codeEditor {
            flex: 1;
            background: #020617;
            border: 2px solid #3b82f6;
            color: #60a5fa;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            border-radius: 8px;
            line-height: 1.6;
            tab-size: 4;
        }

        #codeEditor:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.3);
        }

        /* Output */
        #output {
            background: #020617;
            color: #22c55e;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #22c55e;
            min-height: 80px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-all;
            overflow-y: auto;
            line-height: 1.6;
        }

        .output-empty {
            color: #64748b;
            font-style: italic;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Segoe UI', sans-serif;
        }

        .btn-run {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            flex: 1;
            min-width: 80px;
        }

        .btn-run:hover {
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.4);
            transform: translateY(-1px);
        }

        .btn-clear {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .btn-clear:hover {
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
        }

        .btn-solution {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: white;
        }

        .btn-solution:hover {
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }

        /* Right Panel */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .exercise-panel, .output-panel {
            flex: 1;
            min-height: 0;
        }

        /* Exercise */
        .exercise-content h3 {
            color: #60a5fa;
            margin-bottom: 12px;
            font-size: 1.1em;
        }

        .exercise-content p {
            margin-bottom: 10px;
            color: #bfdbfe;
            font-size: 0.95em;
        }

        .exercise-example {
            background: #0f172a;
            border-left: 4px solid #3b82f6;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            color: #60a5fa;
            font-size: 0.9em;
        }

        .hint {
            background: rgba(96, 165, 250, 0.1);
            border: 2px dashed #60a5fa;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            color: #bfdbfe;
            font-size: 0.85em;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .status.running {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .status.success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .status.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .difficulty {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
            background: #3b82f6;
            color: white;
            margin-right: 10px;
        }

        .difficulty.easy {
            background: #22c55e;
        }

        .difficulty.medium {
            background: #f59e0b;
        }

        .difficulty.hard {
            background: #ef4444;
        }

        /* Navigation */
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            justify-content: space-between;
        }

        .btn-prev, .btn-next {
            background: #3b82f6;
            color: white;
            flex: 1;
        }

        .btn-prev:hover, .btn-next:hover {
            background: #60a5fa;
        }

        .btn-prev:disabled, .btn-next:disabled {
            background: #64748b;
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* Day Navigator */
        .day-navigator {
            background: #0f172a;
            border: 2px solid #3b82f6;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .day-navigator h4 {
            color: #60a5fa;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .day-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .day-button {
            padding: 8px;
            border: 2px solid #334155;
            background: #0f172a;
            color: #bfdbfe;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            transition: all 0.2s;
        }

        .day-button:hover {
            border-color: #60a5fa;
            color: #60a5fa;
        }

        .day-button.active {
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            color: white;
            border-color: #60a5fa;
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }

        .day-button.completed {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            border-color: #22c55e;
        }

        .progress-bar {
            background: #0f172a;
            border: 2px solid #3b82f6;
            border-radius: 6px;
            padding: 6px;
            margin-bottom: 12px;
            height: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 100%);
            height: 100%;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.7em;
            font-weight: bold;
            min-width: 30px;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div>
            <div class="navbar-title">🐍 Python Interactive IDE</div>
            <div class="navbar-info">Day by Day Learning</div>
        </div>
        <div class="day-indicator" id="dayIndicator">📅 Day 1</div>
    </div>

    <div class="container">
        <!-- LEFT: CODE EDITOR -->
        <div class="panel editor-area">
            <div class="panel-header">
                <span>💻 Code Editor</span>
                <span style="font-size: 0.75em; color: #bfdbfe;">Ctrl+Enter: Run</span>
            </div>
            <div class="panel-content">
                <textarea id="codeEditor" placeholder="כתוב קוד כאן..."></textarea>
                <div class="button-group">
                    <button class="btn-run" onclick="runCode()">▶️ Run</button>
                    <button class="btn-clear" onclick="clearCode()">🗑️ Clear</button>
                    <button class="btn-solution" onclick="showSolution()">💡 Solution</button>
                </div>
            </div>
        </div>

        <!-- RIGHT: EXERCISE + OUTPUT -->
        <div class="right-panel">
            <!-- DAY NAVIGATOR -->
            <div class="day-navigator">
                <h4>📅 Choose Day:</h4>
                <div class="day-grid" id="dayGrid"></div>
            </div>

            <!-- PROGRESS -->
            <div>
                <h4 style="color: #60a5fa; margin-bottom: 6px; font-size: 0.9em;">Progress:</h4>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 3%;">1/30</div>
                </div>
            </div>

            <!-- EXERCISE -->
            <div class="panel exercise-panel">
                <div class="panel-header">
                    <span>📋 Exercise</span>
                    <div id="difficultyBadge" class="difficulty easy">Easy</div>
                </div>
                <div class="panel-content exercise-content" id="exerciseContent">
                    <!-- Dynamic Content -->
                </div>
                <div class="nav-buttons">
                    <button class="btn-prev" onclick="previousDay()" id="btnPrev">← Previous</button>
                    <button class="btn-next" onclick="nextDay()" id="btnNext">Next →</button>
                </div>
            </div>

            <!-- OUTPUT -->
            <div class="panel output-panel">
                <div class="panel-header">📤 Output</div>
                <div class="panel-content">
                    <div id="status" style="display: none;"></div>
                    <div id="output" class="output-empty">[ Run your code ]</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 30 Complete Exercises
        const exercises = [
            {
                day: 1,
                title: "Hello Python!",
                difficulty: "easy",
                description: "כתוב program שיעשה:",
                tasks: [
                    '✅ Print "Hello, Python!"',
                    '✅ Print את שמך',
                    '✅ Print משפט עוד'
                ],
                expectedOutput: 'Hello, Python!\nYour Name\nI love coding!',
                hint: 'השתמש ב-print() function לכל שורה',
                solution: `print("Hello, Python!")
print("Your Name")
print("I love coding!")`
            },
            {
                day: 2,
                title: "Variables",
                difficulty: "easy",
                description: "צור משתנים ודפס אותם:",
                tasks: [
                    '✅ משתנה name = "Alice"',
                    '✅ משתנה age = 25',
                    '✅ Print את שניהם'
                ],
                expectedOutput: 'Alice\n25',
                hint: 'בשתנה זה קופסה לטור מידע',
                solution: `name = "Alice"
age = 25
print(name)
print(age)`
            },
            {
                day: 3,
                title: "String Concatenation",
                difficulty: "easy",
                description: "הצמד טקסט:",
                tasks: [
                    '✅ first = "Hello"',
                    '✅ last = "Python"',
                    '✅ Print הצמידה של שניהם'
                ],
                expectedOutput: 'HelloPython',
                hint: 'בשתמש ב-+ להצמדה',
                solution: `first = "Hello"
last = "Python"
print(first + last)`
            },
            {
                day: 4,
                title: "Math Operations",
                difficulty: "easy",
                description: "עשה חישובים:",
                tasks: [
                    '✅ חבר 10 + 5',
                    '✅ הכפל 6 * 7',
                    '✅ חלק 20 / 4'
                ],
                expectedOutput: '15\n42\n5.0',
                hint: 'השתמש בoperators: +, -, *, /',
                solution: `print(10 + 5)
print(6 * 7)
print(20 / 4)`
            },
            {
                day: 5,
                title: "User Input",
                difficulty: "easy",
                description: "קבל קלט מהמשתמש:",
                tasks: [
                    '✅ input() שם',
                    '✅ input() גיל',
                    '✅ Print "Hello, [name]! You are [age] years old"'
                ],
                expectedOutput: 'Hello, Alice! You are 25 years old',
                hint: 'השתמש ב-input() וconcatenation',
                solution: `name = input("What is your name? ")
age = input("What is your age? ")
print("Hello, " + name + "! You are " + age + " years old")`
            },
            {
                day: 6,
                title: "String Length",
                difficulty: "easy",
                description: "מצא את אורך טקסט:",
                tasks: [
                    '✅ text = "Python"',
                    '✅ Print את אורך הטקסט',
                    '✅ בדוק עם len()'
                ],
                expectedOutput: '6',
                hint: 'בשתמש ב-len() function',
                solution: `text = "Python"
print(len(text))`
            },
            {
                day: 7,
                title: "Mini Project: Age Calculator",
                difficulty: "easy",
                description: "בנה age calculator:",
                tasks: [
                    '✅ input את גיל המשתמש',
                    '✅ חשב שנים לעד 100',
                    '✅ Print תוצאה'
                ],
                expectedOutput: 'You have X years left until 100!',
                hint: 'years_left = 100 - age',
                solution: `age = int(input("What is your age? "))
years_left = 100 - age
print("You have " + str(years_left) + " years left until 100!")`
            },
            {
                day: 8,
                title: "if Statement",
                difficulty: "medium",
                description: "עשה החלטה:",
                tasks: [
                    '✅ age = 18',
                    '✅ if age >= 18: print("Adult")',
                    '✅ else: print("Minor")'
                ],
                expectedOutput: 'Adult',
                hint: 'בשתמש ב-if/else',
                solution: `age = 18
if age >= 18:
    print("Adult")
else:
    print("Minor")`
            },
            {
                day: 9,
                title: "elif Statement",
                difficulty: "medium",
                description: "בדוק גרייד:",
                tasks: [
                    '✅ score = 85',
                    '✅ if score >= 90: "A"',
                    '✅ elif score >= 80: "B"',
                    '✅ else: "C"'
                ],
                expectedOutput: 'B',
                hint: 'בשתמש ב-elif לבדיקות מרובות',
                solution: `score = 85
if score >= 90:
    print("A")
elif score >= 80:
    print("B")
else:
    print("C")`
            },
            {
                day: 10,
                title: "Boolean Logic: and/or",
                difficulty: "medium",
                description: "בדוק תנאים מרובים:",
                tasks: [
                    '✅ age = 20, has_license = True',
                    '✅ if age >= 18 and has_license: "Can drive"'
                ],
                expectedOutput: 'Can drive',
                hint: 'בשתמש ב-and, or, not',
                solution: `age = 20
has_license = True
if age >= 18 and has_license:
    print("Can drive")
else:
    print("Cannot drive")`
            },
            {
                day: 11,
                title: "for Loop",
                difficulty: "medium",
                description: "חזור 5 פעמים:",
                tasks: [
                    '✅ for i in range(5):',
                    '✅ print(i)'
                ],
                expectedOutput: '0\n1\n2\n3\n4',
                hint: 'range(5) = 0 עד 4',
                solution: `for i in range(5):
    print(i)`
            },
            {
                day: 12,
                title: "for Loop with range",
                difficulty: "medium",
                description: "הדפס 1 עד 5:",
                tasks: [
                    '✅ for i in range(1, 6):',
                    '✅ print(i)'
                ],
                expectedOutput: '1\n2\n3\n4\n5',
                hint: 'range(1, 6) = 1 עד 5',
                solution: `for i in range(1, 6):
    print(i)`
            },
            {
                day: 13,
                title: "while Loop",
                difficulty: "medium",
                description: "חזור עד שיעצור:",
                tasks: [
                    '✅ count = 0',
                    '✅ while count < 3:',
                    '✅ print(count) ו-count += 1'
                ],
                expectedOutput: '0\n1\n2',
                hint: 'while loop נמשך עד שהתנאי שקר',
                solution: `count = 0
while count < 3:
    print(count)
    count = count + 1`
            },
            {
                day: 14,
                title: "Nested Loops",
                difficulty: "medium",
                description: "multiplication table:",
                tasks: [
                    '✅ for i in range(1, 4):',
                    '✅ for j in range(1, 4):',
                    '✅ print(i * j)'
                ],
                expectedOutput: '1\n2\n3\n2\n4\n6\n3\n6\n9',
                hint: 'loop בתוך loop',
                solution: `for i in range(1, 4):
    for j in range(1, 4):
        print(i * j)`
            },
            {
                day: 15,
                title: "Pattern: Square",
                difficulty: "medium",
                description: "הדפס ריבוע של *:",
                tasks: [
                    '✅ for i in range(3):',
                    '✅ for j in range(3):',
                    '✅ print("*", end=" ")'
                ],
                expectedOutput: '* * * \n* * * \n* * *',
                hint: 'בשתמש בend=" " להדפסה בשורה',
                solution: `for i in range(3):
    for j in range(3):
        print("*", end=" ")
    print()`
            },
            {
                day: 16,
                title: "Function Definition",
                difficulty: "hard",
                description: "כתוב function:",
                tasks: [
                    '✅ def greet(name):',
                    '✅ print("Hello, " + name)',
                    '✅ greet("Alice")'
                ],
                expectedOutput: 'Hello, Alice',
                hint: 'def keyword לפונקציה',
                solution: `def greet(name):
    print("Hello, " + name)

greet("Alice")`
            },
            {
                day: 17,
                title: "Function with return",
                difficulty: "hard",
                description: "Function שחוזר ערך:",
                tasks: [
                    '✅ def add(a, b):',
                    '✅ return a + b',
                    '✅ print(add(5, 3))'
                ],
                expectedOutput: '8',
                hint: 'return זו הפלט של הפונקציה',
                solution: `def add(a, b):
    return a + b

print(add(5, 3))`
            },
            {
                day: 18,
                title: "Multiple Parameters",
                difficulty: "hard",
                description: "Function עם 3 parameters:",
                tasks: [
                    '✅ def multiply(x, y, z):',
                    '✅ return x * y * z',
                    '✅ print(multiply(2, 3, 4))'
                ],
                expectedOutput: '24',
                hint: 'הפרדים בפסיקים',
                solution: `def multiply(x, y, z):
    return x * y * z

print(multiply(2, 3, 4))`
            },
            {
                day: 19,
                title: "Function with if",
                difficulty: "hard",
                description: "Function להבדיל בין בוגר לקטין:",
                tasks: [
                    '✅ def is_adult(age):',
                    '✅ if age >= 18: return "Yes"',
                    '✅ else: return "No"'
                ],
                expectedOutput: 'Yes',
                hint: 'שלב if ו-return',
                solution: `def is_adult(age):
    if age >= 18:
        return "Yes"
    else:
        return "No"

print(is_adult(20))`
            },
            {
                day: 20,
                title: "List Creation",
                difficulty: "hard",
                description: "כתוב רשימה:",
                tasks: [
                    '✅ numbers = [1, 2, 3, 4, 5]',
                    '✅ print(numbers[0])',
                    '✅ print(numbers[2])'
                ],
                expectedOutput: '1\n3',
                hint: 'list הוא [a, b, c]. index מתחיל מ-0',
                solution: `numbers = [1, 2, 3, 4, 5]
print(numbers[0])
print(numbers[2])`
            },
            {
                day: 21,
                title: "Loop through List",
                difficulty: "hard",
                description: "Loop על רשימה:",
                tasks: [
                    '✅ fruits = ["apple", "banana", "orange"]',
                    '✅ for fruit in fruits:',
                    '✅ print(fruit)'
                ],
                expectedOutput: 'apple\nbanana\norange',
                hint: 'for item in list:',
                solution: `fruits = ["apple", "banana", "orange"]
for fruit in fruits:
    print(fruit)`
            },
            {
                day: 22,
                title: "List Length",
                difficulty: "hard",
                description: "מצא את אורך הרשימה:",
                tasks: [
                    '✅ colors = ["red", "blue", "green"]',
                    '✅ print(len(colors))'
                ],
                expectedOutput: '3',
                hint: 'len(list) נותן את מספר הפריטים',
                solution: `colors = ["red", "blue", "green"]
print(len(colors))`
            },
            {
                day: 23,
                title: "Add to List",
                difficulty: "hard",
                description: "הוסף לרשימה:",
                tasks: [
                    '✅ items = [1, 2, 3]',
                    '✅ items.append(4)',
                    '✅ print(items)'
                ],
                expectedOutput: '[1, 2, 3, 4]',

                    '✅ Build a todo app',

                hint: 'בשתמש בכל מה שלמדת: functions, loops, lists, dictionaries, if/else',
                solution: `# Rock Paper Scissors

        let currentDay = 1;

        // Initialize
        window.addEventListener('load', () => {
            renderDayNavigator();
            loadExercise(1);
            updateProgress();
        });

        // Render Day Navigator
        function renderDayNavigator() {
            const grid = document.getElementById('dayGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 30; i++) {
                const btn = document.createElement('button');
                btn.className = 'day-button';
                btn.textContent = i;
                if (i === currentDay) btn.classList.add('active');
                if (localStorage.getItem(`day${i}Completed`)) btn.classList.add('completed');
                btn.onclick = () => { currentDay = i; loadExercise(i); };
                grid.appendChild(btn);
            }
        }

        // Load Exercise
        function loadExercise(day) {
            const exercise = exercises[day - 1];
            currentDay = day;

            // Update Header
            document.getElementById('dayIndicator').textContent = `📅 Day ${day}/30`;

            // Update Difficulty
            const badge = document.getElementById('difficultyBadge');
            badge.textContent = exercise.difficulty.toUpperCase();
            badge.className = `difficulty ${exercise.difficulty}`;

            // Update Exercise Content
            const content = document.getElementById('exerciseContent');
            content.innerHTML = `
                <h3>${day}. ${exercise.title}</h3>
                <p>${exercise.description}</p>
                <div>
                    ${exercise.tasks.map(t => `<div class="exercise-example">${t}</div>`).join('')}
                </div>
                <div class="exercise-example"><strong>Expected Output:</strong><br>${exercise.expectedOutput}</div>
                <div class="hint"><strong>💡 Hint:</strong> ${exercise.hint}</div>
            `;

            // Clear Editor and Output
            document.getElementById('codeEditor').value = '';
            document.getElementById('output').textContent = '[ Run your code ]';
            document.getElementById('status').style.display = 'none';

            // Update Navigation Buttons
            document.getElementById('btnPrev').disabled = day === 1;
            document.getElementById('btnNext').disabled = day === 30;

            // Re-render Navigator
            renderDayNavigator();
            updateProgress();
        }

        // Previous/Next Day
        function previousDay() {
            if (currentDay > 1) loadExercise(currentDay - 1);
        }

        function nextDay() {
            if (currentDay < 30) loadExercise(currentDay + 1);
        }

        // Run Code
        function runCode() {
            const code = document.getElementById('codeEditor').value;
            const output = document.getElementById('output');

            if (!code.trim()) {
                showStatus('❌ Code is empty!', 'error');
                return;
            }

            showStatus('⏳ Running...', 'running');

            let capturedOutput = '';
            const originalLog = console.log;
            const originalWarn = console.warn;

            window.print = function(...args) {
                capturedOutput += args.join(' ') + '\n';
            };

            try {
                eval(code.replace(/print\(/g, 'window.print('));

                if (capturedOutput) {
                    output.textContent = capturedOutput.trim();
                    showStatus('✅ Success!', 'success');
                    markDayCompleted();
                } else {
                    output.textContent = '(Program ran with no output)';
                    showStatus('✅ Code ran!', 'success');
                }
            } catch (error) {
                output.textContent = '❌ ERROR:\n' + error.message;
                showStatus('❌ Error!', 'error');
            }

            console.log = originalLog;
            console.warn = originalWarn;
        }

        // Show Solution
        function showSolution() {
            const exercise = exercises[currentDay - 1];
            document.getElementById('codeEditor').value = exercise.solution;
            showStatus('💡 Solution loaded!', 'success');
        }

        // Clear Code
        function clearCode() {
            document.getElementById('codeEditor').value = '';
            document.getElementById('output').textContent = '[ Run your code ]';
            document.getElementById('status').style.display = 'none';
        }

        // Show Status
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.className = 'status ' + type;
            status.textContent = message;
            status.style.display = 'flex';

            if (type === 'success') {
                setTimeout(() => {
                    status.style.display = 'none';
                }, 2500);
            }
        }

        // Mark Day Completed
        function markDayCompleted() {
            localStorage.setItem(`day${currentDay}Completed`, 'true');
            renderDayNavigator();
            updateProgress();
        }

        // Update Progress
        function updateProgress() {
            let completed = 0;
            for (let i = 1; i <= 30; i++) {
                if (localStorage.getItem(`day${i}Completed`)) completed++;
            }
            const percentage = (completed / 30) * 100;
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressFill').textContent = `${completed}/30`;
        }

        // Keyboard Shortcut
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') runCode();
            if (e.altKey && e.key === 'ArrowRight') nextDay();
            if (e.altKey && e.key === 'ArrowLeft') previousDay();
        });
    </script>
