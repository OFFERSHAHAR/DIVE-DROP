
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .comeback-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: fadeIn 1s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            font-size: 50px;
            margin-bottom: 20px;
            color: #667eea;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        .message {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            text-decoration: none;
            display: inline-block;
        }
        
        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        .features {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
        }
        
        .feature {
            text-align: center;
        }
        
        .feature-icon {
            font-size: 24px;
            margin-bottom: 10px;
            color: #667eea;
        }
        
        .feature-text {
            font-size: 12px;
            color: #666;
        }
        
        @media (max-width: 600px) {
            .comeback-container {
                padding: 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .features {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="comeback-container">
        <div class="logo">🔄</div>
        <h1>חזרה לשרת</h1>
        <p class="message">השרת שלנו חווה כרגע תקלה, אך אנו עובדים כל הזמן כדי להחזיר את השירות לפעילות. אנא נסה שוב בתוך זמן קצר.</p>
        <a href="#" class="button" id="reloadButton">טען מחדש</a>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">⏱️</div>
                <div class="feature-text">זמן קצר</div>
            </div>
            <div class="feature">
                <div class="feature-icon">💻</div>
                <div class="feature-text">שירות מתקדם</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🛡️</div>
                <div class="feature-text">מאובטח SSL</div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('reloadButton').addEventListener('click', function(e) {
            e.preventDefault();
            this.innerHTML = 'טוען...';
            setTimeout(function() {
                window.location.reload();
            }, 1000);
        });
        
        // Auto-refresh after 30 seconds
        setTimeout(function() {
            window.location.reload();
        }, 30000);
    </script>
</body>
</html>
