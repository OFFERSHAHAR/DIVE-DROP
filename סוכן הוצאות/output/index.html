    /* === CHARTS === */

    .chart-box h3 { font-size: 13px; color: var(--muted); margin-bottom: 16px; font-weight: 600; }

    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #0f172a; color: var(--muted); font-weight: 600; padding: 12px 14px; text-align: right; border-bottom: 1px solid var(--border); }
    td { padding: 10px 14px; border-top: 1px solid var(--border); }
    tr:hover td { background: rgba(59,130,246,.07); }
    td.debit { color: var(--red); }
    td.credit { color: var(--green); }
    td.neg { color: var(--red); }

    /* === BADGE === */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; background: rgba(59,130,246,.2); color: #93c5fd; }

    /* === FILTERS === */
    .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .cat-btn { padding: 6px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; color: var(--muted); cursor: pointer; font-size: 12px; transition: all .2s; }
    .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .cat-btn:hover { border-color: var(--accent); }

    /* === ALERTS === */
    .alert { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.4); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; }
    .alert strong { color: var(--red); }

    /* === VIEWS === */
    .view { display: none; }
    .view.active { display: block; }

    /* === SEARCH INPUT === */
    #tx-search { width: 100%; padding: 10px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; margin-bottom: 16px; }
    #tx-search::placeholder { color: var(--muted); }

    /* === HEADINGS === */
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--muted); }

    .summary-box { background: #0f172a; border-radius: 8px; padding: 12px 0; margin-bottom: 16px; }
    .summary-row { display: flex; justify-content: space-between; padding: 8px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .summary-row:last-child { border: none; font-weight: 700; }

    @media (max-width: 768px) {

        </tr>`;
      }).join('');
      return `<table><thead><tr><th>תאריך</th><th>פעולה</th><th>ממי/למי</th><th>קטגוריה</th><th>חובה</th><th>זכות</th><th>יתרה</th></tr></thead><tbody>${rows}</tbody></table>`;
    }

    // === VIEWS ===
    function renderDashboard() {
      const el = document.getElementById('view-dashboard');
      const { totals, monthly, flags, transactions } = APP_DATA;
      const months = Object.keys(monthly);

      el.innerHTML = `
        <h2>סקירה כללית · מאי–יוני 2026</h2>
        <div class="cards-grid">
          <div class="card"><div class="label">סה"כ הכנסות</div><div class="value green">₪${fmt(totals.income)}</div></div>
          <div class="card"><div class="label">סה"כ הוצאות</div><div class="value red">₪${fmt(totals.expense)}</div></div>
          <div class="card"><div class="label">יתרה נטו</div><div class="value ${totals.net>=0?'green':'red'}">₪${fmt(totals.net)}</div></div>
          <div class="card"><div class="label">סה"כ עסקאות</div><div class="value">${transactions.length}</div></div>
          <div class="card" onclick="navigate('transactions')"><div class="label">צ'קים</div><div class="value" style="color:var(--yellow)">3 (1 חזר)</div></div>
          <div class="card"><div class="label">דגלים אדומים</div><div class="value red">${flags.length}</div></div>
        </div>
        <div class="charts-row">
          <div class="chart-box"><h3>הכנסות מול הוצאות לפי חודש</h3><canvas id="ch-monthly"></canvas></div>
          <div class="chart-box"><h3>הוצאות לפי קטגוריה</h3><canvas id="ch-pie"></canvas></div>
        </div>
        <div class="chart-box"><h3>מגמת יתרה לאורך זמן</h3><canvas id="ch-balance"></canvas></div>
        <h3 style="margin-top:28px;margin-bottom:12px;color:var(--red)">⚠️ דגלים אדומים</h3>
        ${flags.map(f=>`<div class="alert"><strong>${f.type}</strong> · ${f.date} · ₪${fmt(f.amount)}<br><small>${f.msg}</small></div>`).join('')}
      `;
      initDashboardCharts();
    }

    function initDashboardCharts() {
      const { monthly, transactions } = APP_DATA;
      const months = Object.keys(monthly);
      const labels = months.map(m => m === '2026-05' ? 'מאי 2026' : 'יוני 2026');

      // גרף עמודות חודשי
      new Chart(document.getElementById('ch-monthly'), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label:'הכנסות', data: months.map(m=>monthly[m].income), backgroundColor:'#22c55e', borderRadius: 6 },
            { label:'הוצאות', data: months.map(m=>monthly[m].expense), backgroundColor:'#ef4444', borderRadius: 6 }
          ]
        },
        options: { responsive:true, plugins:{ legend:{position:'bottom', labels:{color:'var(--text)', font:{size:12}}} }, scales:{ x:{ticks:{color:'var(--muted)'}, grid:{color:'var(--border)'}}, y:{ticks:{color:'var(--muted)'}, grid:{color:'var(--border)'}} } }
      });

      // גרף עוגה קטגוריות
      const catTotals = {};
      transactions.filter(t=>t.debit>0).forEach(t=>{ catTotals[t.cat]=(catTotals[t.cat]||0)+t.debit; });
      const colors = Object.keys(catTotals).map(c => getCatColor(c));

      new Chart(document.getElementById('ch-pie'), {
        type: 'doughnut',
        data: {
          labels: Object.keys(catTotals),
          datasets: [{ data: Object.values(catTotals), backgroundColor: colors, borderWidth: 0 }]
        },
        options: { responsive:true, plugins:{ legend:{position:'bottom', labels:{color:'var(--text)', font:{size:12}, padding:12}} } }
      });

      // גרף קו יתרה
      const balanceData = transactions.map(t=>({ x: t.date, y: t.balance }));
      new Chart(document.getElementById('ch-balance'), {
        type: 'line',
        data: { datasets: [{ label:'יתרה', data: balanceData, borderColor:'#3b82f6', fill:true, backgroundColor:'rgba(59,130,246,.1)', tension:.3, pointRadius: 2 }] },
        options: { responsive:true, scales:{ x:{type:'category', ticks:{color:'var(--muted)'}, grid:{color:'var(--border)'}}, y:{ticks:{color:'var(--muted)'}, grid:{color:'var(--border)'}} }, plugins:{ legend:{display:false} } }
      });
    }

    function renderMonths() {
      const { monthly, transactions } = APP_DATA;
      const el = document.getElementById('view-months');
      const monthNames = { '2026-05':'מאי 2026', '2026-06':'יוני 2026' };

      const cards = Object.entries(monthly).map(([m, data]) => `
        <div class="card" onclick="renderMonthDetail('${m}')" style="cursor:pointer">
          <div class="label">${monthNames[m]}</div>
          <div style="display:flex;flex-direction:column;gap:8px;margin-top:12px">
            <span style="color:var(--green)">הכנסות: ₪${fmt(data.income)}</span>
            <span style="color:var(--red)">הוצאות: ₪${fmt(data.expense)}</span>
            <span style="color:${data.net>=0?'var(--green)':'var(--red)'}">נטו: ₪${fmt(data.net)}</span>
          </div>
          <div style="color:var(--muted);font-size:12px;margin-top:8px">${data.txCount} עסקאות · לחץ לפירוט</div>
        </div>
      `).join('');

      el.innerHTML = `
        <h2>דוחות חודשיים</h2>
        <div class="cards-grid">${cards}</div>
        <div id="month-detail"></div>
      `;
    }

    function renderMonthDetail(month) {
      const { transactions } = APP_DATA;
      const monthNames = { '2026-05':'מאי 2026', '2026-06':'יוני 2026' };
      const txs = transactions.filter(t => t.month === month);
      const income = txs.reduce((s,t)=>s+t.credit, 0);
      const expense = txs.reduce((s,t)=>s+t.debit, 0);

      document.getElementById('month-detail').innerHTML = `
        <h3 style="margin:24px 0 16px">${monthNames[month]}</h3>
        <div class="cards-grid" style="grid-template-columns:repeat(3,1fr)">
          <div class="card"><div class="label">הכנסות</div><div class="value green">₪${fmt(income)}</div></div>
          <div class="card"><div class="label">הוצאות</div><div class="value red">₪${fmt(expense)}</div></div>
          <div class="card"><div class="label">עסקאות</div><div class="value">${txs.length}</div></div>
        </div>
        <div class="table-wrap">${buildTxTable(txs)}</div>
      `;
    }

    let currentCat = 'הכל';
    const ALL_CATS = ['הכל', ...new Set(APP_DATA.transactions.map(t=>t.cat))];

    function renderTransactions() {
      const el = document.getElementById('view-transactions');
      el.innerHTML = `
        <h2>כל העסקאות</h2>
        <input id="tx-search" type="text" placeholder="חיפוש לפי שם / פרטים..."
          oninput="doFilter()">
        <div class="filter-bar">
          ${ALL_CATS.map(c=>`<button class="cat-btn ${c===currentCat?'active':''}" onclick="currentCat='${c}';doFilter()">${c}</button>`).join('')}
        </div>
        <div id="tx-count" style="color:var(--muted);font-size:12px;margin-bottom:12px"></div>
        <div class="table-wrap" id="tx-table"></div>
      `;
      doFilter();
    }

    function doFilter() {
      const searchText = document.getElementById('tx-search')?.value || '';
      const filtered = APP_DATA.transactions.filter(t =>
        (currentCat === 'הכל' || t.cat === currentCat) &&
        (!searchText || t.op.includes(searchText) || (t.details||'').includes(searchText) || (t.to||'').includes(searchText))
      );
      document.getElementById('tx-count').textContent = `${filtered.length} עסקאות מוצגות`;
      document.getElementById('tx-table').innerHTML = buildTxTable(filtered);
    }

    function renderAnalysis() {
      const { transactions, checks, totals } = APP_DATA;
      const el = document.getElementById('view-analysis');

      // חישוב קטגוריות
      const cats = {};
      transactions.forEach(t => {
        if (!cats[t.cat]) cats[t.cat] = { debit:0, credit:0, count:0 };
        cats[t.cat].debit += t.debit;
        cats[t.cat].credit += t.credit;
        cats[t.cat].count++;
      });

      const catRows = Object.entries(cats).map(([cat, d]) => {
        const net = d.credit - d.debit;
        return `<tr>
          <td>${cat}</td><td>${d.count}</td>
          <td class="debit">${d.debit ? '₪'+fmt(d.debit) : '—'}</td>
          <td class="credit">${d.credit ? '₪'+fmt(d.credit) : '—'}</td>
          <td class="${net>=0?'credit':'debit'}">${net>=0?'+':''}₪${fmt(net)}</td>
        </tr>`;
      }).join('');

      const checkRows = checks.map(c => `<tr>
        <td>${c.date}</td><td>שיק #${c.num}</td>
        <td class="debit">₪${fmt(c.amount)}</td>
        <td style="color:${c.status==='חזר'?'var(--red)':'var(--green)'}">${c.status}${c.reason?' ('+c.reason+')':''}</td>
      </tr>`).join('');

      el.innerHTML = `
        <h2>ניתוח מעמיק</h2>
        <div class="charts-row" style="margin-bottom:24px">
          <div class="chart-box"><h3>הכנסות מול הוצאות לפי קטגוריה</h3><canvas id="ch-horiz"></canvas></div>
          <div class="chart-box">
            <h3>📝 המלצות</h3>
            <ul style="padding-right:20px;line-height:1.8;color:var(--muted);font-size:13px">
              <li>בדוק כל הוראת קבע — ודא שהיא רלוונטית</li>
              <li>פתור את בעיית הצ'ק החוזר (שיק 10013)</li>
              <li>יתרה נטו שלילית — שקול הפחתת הוצאות</li>
              <li>כספומט: 3 הפקדות מזומן — עקוב אחרי מקורות</li>
              <li>בנה תקציב חודשי להפחתת הגירעון</li>
            </ul>
          </div>
        </div>
        <h3>סיכום לפי קטגוריה</h3>
        <div class="table-wrap" style="margin-bottom:24px">
          <table><thead><tr><th>קטגוריה</th><th>עסקאות</th><th>חובה</th><th>זכות</th><th>נטו</th></tr></thead><tbody>${catRows}</tbody></table>
        </div>
        <h3>צ'קים</h3>
        <div class="table-wrap">
          <table><thead><tr><th>תאריך</th><th>שיק</th><th>סכום</th><th>סטטוס</th></tr></thead><tbody>${checkRows}</tbody></table>
        </div>
      `;

      // גרף פסים אופקי
      const expCats = Object.entries(cats).filter(([,d])=>d.debit>0);
      new Chart(document.getElementById('ch-horiz'), {
        type: 'bar',
        data: {
          labels: expCats.map(([c])=>c),
          datasets: [
            { label:'הוצאות', data: expCats.map(([,d])=>d.debit), backgroundColor:'#ef4444', borderRadius: 6 },
            { label:'הכנסות', data: expCats.map(([,d])=>d.credit), backgroundColor:'#22c55e', borderRadius: 6 }
          ]
        },
        options: { indexAxis:'y', responsive:true, plugins:{ legend:{position:'bottom', labels:{color:'var(--text)', font:{size:12}}} }, scales:{ x:{ticks:{color:'var(--muted)'}, grid:{color:'var(--border)'}}, y:{ticks:{color:'var(--muted)'}, grid:{color:'var(--border)'}} } }
      });
    }

    // === ROUTER ===
    function navigate(view) {
      // עדכון כפתורי ניווט
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      const navMap = { dashboard:0, months:1, transactions:2, analysis:3 };
      document.querySelectorAll('.nav-btn')[navMap[view]]?.classList.add('active');

      // הסתרת כל ה-views
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(`view-${view}`).classList.add('active');

      // render
      const renders = { dashboard: renderDashboard, months: renderMonths, transactions: renderTransactions, analysis: renderAnalysis };
      renders[view]();

      // URL hash
      window.location.hash = view;
    }

    // === INIT ===
    window.addEventListener('DOMContentLoaded', () => {
      const hash = window.location.hash.replace('#','') || 'dashboard';
      if (hash && ['dashboard','months','transactions','analysis'].includes(hash)) {
        navigate(hash);
      }
    });

    window.addEventListener('hashchange', () => {
      const hash = window.location.hash.replace('#','');
      if (hash && ['dashboard','months','transactions','analysis'].includes(hash)) {
        navigate(hash);
      }
    });

    // טעינה ראשונית
    navigate('dashboard');
  </script>
</body>
</html>
