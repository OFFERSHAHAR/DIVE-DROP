<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Python Classroom</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }

        .header {
            height: 60px;
            background: linear-gradient(90deg, #7c3aed 0%, #ec4899 100%);
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
            border-bottom: 2px solid #06b6d4;
        }

        .header h1 { font-size: 1.8em; color: white; font-weight: 900; }
        .header .info { color: white; font-weight: 600; font-size: 1.1em; }

        .container {
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            height: calc(100vh - 60px);
            gap: 0;
        }

        /* LEFT */
        .left-panel {
            background: #1e293b;
            border-right: 2px solid #334155;
            display: flex;
            flex-direction: column;
        }

        .left-header {
            background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
            color: white;
            padding: 15px;
            font-weight: 700;
            text-align: center;
            border-bottom: 2px solid #334155;
        }

        .lessons {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .lesson {
            padding: 12px;
            margin: 6px 0;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }

        .lesson:hover { border-color: #7c3aed; background: #1e293b; }
        .lesson.active { background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%); color: white; border-left-color: #06b6d4; }
        .lesson-day { font-size: 0.85em; color: #60a5fa; font-weight: 700; }
        .lesson-name { font-size: 0.95em; font-weight: 600; margin: 3px 0; }
        .lesson-diff { font-size: 0.75em; background: rgba(59, 130, 246, 0.3); padding: 2px 6px; border-radius: 4px; display: inline-block; }

        /* CENTER */
        .center-panel {
            background: #0f172a;
            border-right: 2px solid #334155;
            display: flex;
            flex-direction: column;
        }

        .center-header {
            background: #1e293b;
            padding: 20px;
            border-bottom: 2px solid #334155;
        }

        .center-header h2 {
            font-size: 1.8em;
            background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .center-header .meta {
            display: flex;
            gap: 15px;
            font-size: 0.9em;
            color: #bfdbfe;
        }

        .editor-output {
            flex: 1;
            display: grid;
            grid-template-rows: 1fr 180px;
            gap: 10px;
            padding: 15px;
            overflow: hidden;
        }

        .code-box, .output-box {
            background: #020617;
            border: 2px solid #3b82f6;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }

        .code-header, .output-header {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 10px 15px;
            font-weight: 700;
            border-bottom: 2px solid #1e40af;
        }

        .output-box { border-color: #22c55e; }
        .output-header { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); border-bottom-color: #15803d; }

        #code {
            flex: 1;
            background: #020617;
            color: #60a5fa;
            border: none;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            line-height: 1.6;
        }

        #output {
            flex: 1;
            color: #22c55e;
            padding: 12px 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.5;
        }

        .buttons {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #1e293b;
            border-top: 2px solid #334155;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
            flex: 1;
        }

        .btn-run { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); }
        .btn-run:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3); }

        .btn-clear { background: #ef4444; }
        .btn-clear:hover { background: #dc2626; }

        .btn-sol { background: #3b82f6; }
        .btn-sol:hover { background: #2563eb; }

        /* RIGHT */
        .right-panel {
            background: #1e293b;
            border-left: 2px solid #334155;
            display: flex;
            flex-direction: column;
        }

        .right-header {
            background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
            color: white;
            padding: 15px;
            font-weight: 700;
            text-align: center;
            border-bottom: 2px solid #334155;
        }

        .right-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .section {
            margin-bottom: 18px;
        }

        .section-title {
            color: #60a5fa;
            font-weight: 700;
            font-size: 0.95em;
            margin-bottom: 10px;
        }

        .task { padding: 8px 12px; background: #0f172a; border-radius: 6px; margin: 6px 0; color: #bfdbfe; font-size: 0.9em; border-right: 3px solid #3b82f6; }

        .expected { background: #020617; padding: 10px; border-radius: 6px; border-left: 3px solid #22c55e; color: #86efac; font-family: 'Courier New', monospace; font-size: 0.85em; margin: 8px 0; }

        .hint { background: rgba(6, 182, 212, 0.1); border: 2px dashed #06b6d4; padding: 10px; border-radius: 6px; color: #a5f3fc; font-size: 0.85em; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 3px; }

        .msg { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: white; font-weight: 700; display: none; z-index: 999; }
        .msg.show { display: block; animation: pop 0.3s; }
        .msg.ok { background: #22c55e; }
        .msg.err { background: #ef4444; }
        @keyframes pop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐍 Python Classroom</h1>
        <div class="info" id="dayInfo">📅 Day 1/30</div>
    </div>

    <div class="container">
        <!-- LEFT -->
        <div class="left-panel">
            <div class="left-header">📚 Lessons</div>
            <div class="lessons" id="lessonsList"></div>
        </div>

        <!-- CENTER -->
        <div class="center-panel">
            <div class="center-header">
                <h2 id="title">Hello Python!</h2>
                <div class="meta">
                    <div>⏱️ 10 min</div>
                    <div id="diff">Easy</div>
                </div>
            </div>

            <div class="editor-output">
                <div class="code-box">
                    <div class="code-header">💻 Code Editor</div>
                    <textarea id="code" placeholder="Write Python code..."></textarea>
                </div>

                <div class="output-box">
                    <div class="output-header">📤 Output</div>
                    <div id="output" style="color: #64748b; font-style: italic;">[ Run your code ]</div>
                </div>
            </div>

            <div class="buttons">
                <button class="btn-run" onclick="run()">▶️ Run</button>
                <button class="btn-clear" onclick="clear()">🗑️ Clear</button>
                <button class="btn-sol" onclick="sol()">💡 Solution</button>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="right-panel">
            <div class="right-header">📋 Exercise</div>
            <div class="right-content">
                <div class="section">
                    <div class="section-title">Tasks:</div>
                    <div id="tasks"></div>
                </div>

                <div class="section">
                    <div class="section-title">Expected Output:</div>
                    <div class="expected" id="expected"></div>
                </div>

                <div class="section">
                    <div class="section-title">💡 Hint:</div>
                    <div class="hint" id="hint"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="msg" id="msg"></div>

    <script>
        const data = [
            { day: 1, title: "Hello Python!", diff: "Easy", tasks: ['✅ Print "Hello, Python!"', '✅ Print your name', '✅ Print one more'], exp: 'Hello, Python!\nYour Name\nI love coding!', hint: 'Use print() function for each line', sol: 'print("Hello, Python!")\nprint("Your Name")\nprint("I love coding!")' },
            { day: 2, title: "Variables", diff: "Easy", tasks: ['✅ name = "Alice"', '✅ age = 25', '✅ Print name', '✅ Print age'], exp: 'Alice\n25', hint: 'A variable stores a value. Use = to assign', sol: 'name = "Alice"\nage = 25\nprint(name)\nprint(age)' },
            { day: 3, title: "String Concat", diff: "Easy", tasks: ['✅ first = "Hello"', '✅ last = "Python"', '✅ Print combined'], exp: 'HelloPython', hint: 'Use + to join strings', sol: 'first = "Hello"\nlast = "Python"\nprint(first + last)' },
            { day: 4, title: "Math", diff: "Easy", tasks: ['✅ 10 + 5', '✅ 6 * 7', '✅ 20 / 4'], exp: '15\n42\n5.0', hint: 'Use operators: +, -, *, /', sol: 'print(10 + 5)\nprint(6 * 7)\nprint(20 / 4)' },
            { day: 5, title: "Input", diff: "Easy", tasks: ['✅ input() name', '✅ input() age', '✅ Print greeting'], exp: 'Hello, Alice! You are 25', hint: 'Use input() function', sol: 'name = input("Name: ")\nage = input("Age: ")\nprint("Hello, " + name + "!")' },
            ...Array.from({length: 25}, (_, i) => ({ day: i + 6, title: `Day ${i + 6}`, diff: i < 10 ? "Easy" : i < 20 ? "Medium" : "Hard", tasks: ['✅ Complete task'], exp: '[output]', hint: 'Think step by step', sol: 'print("Done!")' }))
        ];

        let cur = 1;

        function init() {
            const list = document.getElementById('lessonsList');
            list.innerHTML = data.map((d, i) => `<div class="lesson ${i === 0 ? 'active' : ''}" onclick="load(${d.day})">${i === 0 ? '<div class="lesson-day">Day ' + d.day + '</div><div class="lesson-name">' + d.title + '</div><div class="lesson-diff">' + d.diff + '</div>' : '<div class="lesson-day">Day ' + d.day + '</div><div class="lesson-name">' + d.title + '</div>'}</div>`).join('');
            load(1);
        }

        function load(day) {
            cur = day;
            const ex = data[day - 1];

            document.getElementById('dayInfo').textContent = `📅 Day ${day}/30`;
            document.getElementById('title').textContent = ex.title;
            document.getElementById('diff').textContent = ex.diff;
            document.getElementById('tasks').innerHTML = ex.tasks.map(t => `<div class="task">${t}</div>`).join('');
            document.getElementById('expected').textContent = ex.exp;
            document.getElementById('hint').textContent = ex.hint;

            document.getElementById('code').value = '';
            document.getElementById('output').textContent = '[ Run your code ]';
            document.getElementById('output').style.color = '#64748b';

            document.querySelectorAll('.lesson').forEach((e, i) => e.classList.toggle('active', i === day - 1));
        }

        function run() {
            const code = document.getElementById('code').value;
            if (!code.trim()) { msg('❌ Empty!', 'err'); return; }

            let out = '';
            window.print = (...a) => out += a.join(' ') + '\n';

            try {
                eval(code.replace(/print\(/g, 'window.print('));
                document.getElementById('output').textContent = out.trim() || '(no output)';
                document.getElementById('output').style.color = '#22c55e';
                msg('✅ Success!', 'ok');
            } catch (e) {
                document.getElementById('output').textContent = '❌ ' + e.message;
                document.getElementById('output').style.color = '#ef4444';
                msg('❌ Error!', 'err');
            }
        }

        function clear() {
            document.getElementById('code').value = '';
            document.getElementById('output').textContent = '[ Run your code ]';
            document.getElementById('output').style.color = '#64748b';
        }

        function sol() {
            document.getElementById('code').value = data[cur - 1].sol;
            msg('💡 Loaded!', 'ok');
        }

        function msg(text, type) {
            const m = document.getElementById('msg');
            m.textContent = text;
            m.className = 'msg show ' + type;
            setTimeout(() => m.classList.remove('show'), 2500);
        }

        window.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'Enter') run();
        });

        init();
    </script>
</body>
</html>
