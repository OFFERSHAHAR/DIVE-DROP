<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101318">
  <title>Agent Factory Mini App</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div>
        <p class="eyebrow">Agent Factory</p>
        <h1>מרכז זרימה חי</h1>
      </div>
      <div class="status-pill" id="connectionState">מתחבר</div>
    </section>

    <section class="control-strip">
      <label>
        <span>Chat ID</span>
        <input id="chatIdInput" inputmode="numeric" placeholder="לדוגמה 7799410671">
      </label>
      <label>
        <span>API</span>
        <input id="apiBaseInput" placeholder="http://127.0.0.1:5000">
      </label>
      <button id="connectBtn" class="primary-btn" type="button">התחבר</button>
    </section>

    <section class="grid">
      <article class="panel hero-panel">
        <div class="panel-title">
          <span>החלטה נוכחית</span>
          <strong id="currentStage">ממתין לאירוע</strong>
        </div>
        <div class="agent-orb" id="agentOrb">
          <span id="agentInitial">A</span>
        </div>
        <h2 id="currentAgent">אין סוכן פעיל</h2>
        <p id="currentReason">שלח הודעה לבוט בטלגרם והזרימה תופיע כאן בזמן אמת.</p>
        <div class="metrics">
          <div><span id="eventCount">0</span><small>אירועים</small></div>
          <div><span id="agentCount">0</span><small>סוכנים</small></div>
          <div><span id="memoryCount">0</span><small>זיכרונות</small></div>
        </div>
      </article>

      <article class="panel">
        <div class="panel-title">
          <span>דיבור פנימי</span>
          <strong>Live</strong>
        </div>
        <div class="thought-box" id="thoughtBox">עדיין אין מחשבה פנימית להצגה.</div>
      </article>

      <article class="panel wide">
        <div class="panel-title">
          <span>מועמדים לבחירה</span>
          <strong id="candidateLabel">Top matches</strong>
        </div>
        <div class="candidate-list" id="candidateList"></div>
      </article>

      <article class="panel wide timeline-panel">
        <div class="panel-title">
          <span>ציר זרימה</span>
          <button id="clearBtn" class="ghost-btn" type="button">נקה תצוגה</button>
        </div>
        <div class="timeline" id="timeline"></div>
      </article>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
