name: Mobile Verification Suite

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'app/**'
      - 'components/**'
      - '.github/workflows/mobile-verify.yml'
      - 'package.json'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  mobile-verification:
    name: Mobile Compliance Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compilation check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run mobile verification script
        id: mobile-verify
        run: node scripts/mobile-verification.mjs
        continue-on-error: true

      - name: Check for responsive classes
        id: responsive-check
        run: |
          echo "Checking for responsive Tailwind classes..."
          if grep -r "sm:\|md:\|lg:\|xl:" src/ app/ 2>/dev/null; then
            echo "✓ Responsive classes found"
            echo "responsive_classes=found" >> $GITHUB_OUTPUT
          else
            echo "⚠ Limited responsive classes detected"
            echo "responsive_classes=limited" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Validate safe area implementation
        id: safe-area-check
        run: |
          echo "Checking safe area implementation..."
          if grep -r "viewport-fit\|safe-area-inset" . --include="*.tsx" --include="*.css" 2>/dev/null; then
            echo "✓ Safe area implementation found"
            echo "safe_area=implemented" >> $GITHUB_OUTPUT
          else
            echo "⚠ Safe area implementation not found"
            echo "safe_area=missing" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Check input accessibility
        id: input-check
        run: |
          echo "Checking input accessibility attributes..."
          MISSING_INPUTMODE=$(grep -r "<input" src/ app/ --include="*.tsx" 2>/dev/null | grep -v "inputMode\|input-mode" | wc -l)
          echo "Inputs without inputMode: $MISSING_INPUTMODE"
          echo "missing_inputmode=$MISSING_INPUTMODE" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Build for verification
        run: npm run build
        continue-on-error: true

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Check button sizing compliance
        id: button-size-check
        run: |
          echo "Checking button sizing compliance..."
          # Look for potentially small button sizes
          SMALL_BUTTONS=$(grep -r "w-\[0-9\]\{1,2\}px\]\|h-\[0-9\]\{1,2\}px\]" src/ app/ --include="*.tsx" 2>/dev/null | wc -l)
          echo "Potential small button issues: $SMALL_BUTTONS"
          echo "small_button_count=$SMALL_BUTTONS" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check max-width usage
        id: max-width-check
        run: |
          echo "Checking responsive width patterns..."
          FIXED_WIDTHS=$(grep -r "w-\[0-9]\{3,\}px\]" src/ app/ --include="*.tsx" 2>/dev/null | wc -l)
          MAX_WIDTHS=$(grep -r "max-w-" src/ app/ --include="*.tsx" 2>/dev/null | wc -l)
          echo "Fixed widths found: $FIXED_WIDTHS"
          echo "Max-width patterns found: $MAX_WIDTHS"
          echo "fixed_widths=$FIXED_WIDTHS" >> $GITHUB_OUTPUT
          echo "max_widths=$MAX_WIDTHS" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Generate verification report
        id: report
        if: always()
        run: |
          cat > mobile-verification-report.md << 'EOF'
          # Mobile Verification Report

          ## Build & Compilation
          - TypeScript: ${{ job.status }}

          ## Mobile Compliance Checks

          ### Safe Area Implementation
          - Status: ${{ steps.safe-area-check.outputs.safe_area }}
          - Critical for: iPhone notch, Dynamic Island, Android notch handling

          ### Responsive Design
          - Responsive Classes: ${{ steps.responsive-check.outputs.responsive_classes }}
          - Expected: sm:, md:, lg: classes throughout components

          ### Input Accessibility
          - Inputs without inputMode: ${{ steps.input-check.outputs.missing_inputmode }}
          - Target: All inputs should have appropriate inputMode

          ### Touch Target Sizing
          - Potential small buttons: ${{ steps.button-size-check.outputs.small_button_count }}
          - Requirement: All touch targets ≥ 44×44px

          ### Responsive Width Patterns
          - Fixed width instances: ${{ steps.max-width-check.outputs.fixed_widths }}
          - Max-width patterns: ${{ steps.max-width-check.outputs.max_widths }}
          - Better approach: Use max-w-* instead of fixed widths for mobile

          ## Verification Status

          - [ ] TypeScript compiles
          - [ ] No critical responsive violations
          - [ ] Safe area implementation verified
          - [ ] Input accessibility confirmed
          - [ ] Touch target sizes compliant

          ## Recommendations

          1. Review the full verification report: `verification-report.json`
          2. Test on real iOS and Android devices
          3. Verify with Xcode Simulator and Android Studio Emulator
          4. Run MOBILE_TESTING_GUIDE.md before release

          ---
          Generated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          EOF
          cat mobile-verification-report.md

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('mobile-verification-report.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-verification-report
          path: |
            verification-report.json
            mobile-verification-report.md
          retention-days: 30

      - name: Check verification results
        id: check-results
        run: |
          if [ -f verification-report.json ]; then
            echo "Verification report generated successfully"
            node -e "const r = require('./verification-report.json'); console.log('Results:', r.summary);"
          fi
        continue-on-error: true

      - name: Set workflow status
        if: always()
        run: |
          echo "## Mobile Verification Summary"
          echo ""
          echo "✓ Workflow executed successfully"
          echo "📄 Check artifacts for detailed reports"
          echo ""
          echo "### Next Steps:"
          echo "1. Review the mobile-verification-report.md file"
          echo "2. Address any critical issues"
          echo "3. Test on physical devices using MOBILE_TESTING_GUIDE.md"

  lighthouse-mobile:
    name: Lighthouse Mobile Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        continue-on-error: true

      - name: Start dev server
        run: |
          npm run dev &
          sleep 10
        continue-on-error: true

      - name: Run Lighthouse audit
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: './lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

  accessibility-check:
    name: Accessibility Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint with accessibility plugin
        run: npm run lint
        continue-on-error: true

      - name: Validate WCAG compliance patterns
        run: |
          echo "Checking for common accessibility patterns..."
          # Check for alt text on images
          if grep -r "<Image\|<img" src/ app/ --include="*.tsx" 2>/dev/null | grep -v "alt=" | wc -l > 0; then
            echo "⚠️ Some images may be missing alt text"
          fi
          # Check for button text
          if grep -r "<button" src/ app/ --include="*.tsx" 2>/dev/null | grep -v ">" | wc -l > 0; then
            echo "⚠️ Verify all buttons have accessible text/aria-labels"
          fi
        continue-on-error: true

  test-results:
    name: Test Results Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [mobile-verification, accessibility-check]

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true

      - name: Display verification summary
        run: |
          if [ -f mobile-verification-report/mobile-verification-report.md ]; then
            echo "## Verification Report Available"
            cat mobile-verification-report/mobile-verification-report.md
          fi
        continue-on-error: true

      - name: Workflow completion
        run: |
          echo "✓ Mobile Verification workflow completed"
          echo ""
          echo "📋 To complete manual testing:"
          echo "   1. Follow MOBILE_TESTING_GUIDE.md"
          echo "   2. Test on physical iOS devices (iPhone SE, 12, 14+)"
          echo "   3. Test on physical Android devices (with and without notch)"
          echo "   4. Verify safe area implementation in landscape"
          echo "   5. Validate touch target sizes (minimum 44×44px)"
